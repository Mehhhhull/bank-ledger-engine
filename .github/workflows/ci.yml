name: build-and-lint

#define when the workflow should run
#trigger on push to main branch and on pull request to main branch
on:
  push:
    branches: [main,dev]
  pull_request:
    branches: [main,dev]

#difine a job called build(multiple jobs can be defined for different tasks like test, deploy etc.)
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run lint fix
        run: npm run lint:fix

      - name: Run format
        run: npm run format